<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - On the Way</title>
  <style>
    :root {
      --primary: #10b981;
      --background: #0f172a;
      --card: #1e293b;
      --border: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --error: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--background);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      max-width: 380px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      text-align: center;
    }
    p.sub {
      margin: 0 0 20px;
      color: var(--text-muted);
      text-align: center;
      font-size: 14px;
    }
    label {
      display: block;
      font-size: 13px;
      color: var(--text-muted);
      margin: 12px 0 4px;
    }
    input {
      width: 100%;
      padding: 12px;
      background: var(--background);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 16px;
      outline: none;
    }
    input:focus {
      border-color: var(--primary);
    }
    button {
      width: 100%;
      padding: 12px;
      margin-top: 16px;
      background: var(--primary);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .msg {
      margin-top: 12px;
      font-size: 14px;
      text-align: center;
      min-height: 18px;
    }
    .msg.err { color: var(--error); }
    .msg.ok { color: var(--primary); }
    .logo {
      text-align: center;
      font-size: 28px;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📦</div>
    <h1>Set New Password</h1>
    <p class="sub">Choose a new password for your On the Way account.</p>

    <div id="form-area">
      <label for="pw">New password</label>
      <input id="pw" type="password" autocomplete="new-password" placeholder="At least 8 characters" />

      <label for="pw2">Confirm password</label>
      <input id="pw2" type="password" autocomplete="new-password" placeholder="Re-enter password" />

      <button id="submit">Update password</button>
      <div id="msg" class="msg"></div>
    </div>

    <div id="success-area" style="display:none;">
      <p class="sub" style="margin-top:16px;">
        ✅ Password updated! You can close this tab and sign in to the On the Way app with your new password.
      </p>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://clqivishcuwlptoumdre.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNscWl2aXNoY3V3bHB0b3VtZHJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NjYzNTUsImV4cCI6MjA5MTQ0MjM1NX0.YAoevh3WNcKVpsj46f0lNFj3kRUmvp2g7FoUp9f1opI';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { detectSessionInUrl: true, persistSession: false, autoRefreshToken: false }
    });

    const msg = document.getElementById('msg');
    const formArea = document.getElementById('form-area');
    const successArea = document.getElementById('success-area');
    const btn = document.getElementById('submit');
    const pw = document.getElementById('pw');
    const pw2 = document.getElementById('pw2');

    // Wait for Supabase to detect the recovery token from the URL hash
    let recoveryReady = false;
    supabase.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY' || (event === 'SIGNED_IN' && session)) {
        recoveryReady = true;
      }
    });

    // Also check if a session is already established (covers reloads etc.)
    const { data: sessionData } = await supabase.auth.getSession();
    if (sessionData?.session) recoveryReady = true;

    // If no recovery token at all, show a friendlier message
    setTimeout(async () => {
      const { data } = await supabase.auth.getSession();
      if (!data?.session && !recoveryReady) {
        msg.className = 'msg err';
        msg.textContent = 'This link is invalid or has expired. Request a new reset email from the app.';
        btn.disabled = true;
      }
    }, 800);

    btn.addEventListener('click', async () => {
      msg.className = 'msg';
      msg.textContent = '';

      if (pw.value.length < 8) {
        msg.className = 'msg err';
        msg.textContent = 'Password must be at least 8 characters.';
        return;
      }
      if (pw.value !== pw2.value) {
        msg.className = 'msg err';
        msg.textContent = 'Passwords do not match.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Updating…';

      const { error } = await supabase.auth.updateUser({ password: pw.value });

      if (error) {
        msg.className = 'msg err';
        msg.textContent = error.message || 'Could not update password.';
        btn.disabled = false;
        btn.textContent = 'Update password';
        return;
      }

      formArea.style.display = 'none';
      successArea.style.display = 'block';
      await supabase.auth.signOut();
    });
  </script>
</body>
</html>
